<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Три белых кубика</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            color: #ccc;
            font: 14px Arial;
            pointer-events: none;
            user-select: none;
            border: 1px solid #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="info">⚪ Три белых кубика — статичная сцена</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Сцена, камера, рендерер ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);

        // Фиксированная камера — никакого вращения
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 3.5, 7);
        camera.lookAt(0, 1.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Освещение (реалистичное) ---

        // Мягкий заполняющий свет
        const ambient = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambient);

        // Основной источник света с тенями
        const dirLight = new THREE.DirectionalLight(0xffeedd, 3.0);
        dirLight.position.set(6, 10, 4);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -8;
        dirLight.shadow.camera.right = 8;
        dirLight.shadow.camera.top = 8;
        dirLight.shadow.camera.bottom = -8;
        scene.add(dirLight);

        // Подсветка сзади (для бликов)
        const backLight = new THREE.DirectionalLight(0x88bbff, 0.5);
        backLight.position.set(-3, 1, -6);
        scene.add(backLight);

        // Верхний акцент
        const topLight = new THREE.DirectionalLight(0xffffff, 0.3);
        topLight.position.set(0, 8, 0);
        scene.add(topLight);

        // --- Пол (стол) ---
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x4a4a5a,
            roughness: 0.6,
            metalness: 0.1,
            side: THREE.DoubleSide,
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);

        // Сетка для красоты (придаёт ощущение стола)
        const grid = new THREE.GridHelper(12, 20, 0xaaaaaa, 0x555555);
        grid.position.y = 0;
        scene.add(grid);

        // --- Три белых кубика с чёткими рёбрами ---

        function createWhiteCube(posX, posZ, rotationY = 0) {
            const size = 1.2;
            // Основной материал – белый, слегка шероховатый, с лёгким блеском
            const material = new THREE.MeshStandardMaterial({
                color: 0xf5f5f5,
                roughness: 0.25,
                metalness: 0.05,
                emissive: new THREE.Color(0x222222).multiplyScalar(0.02),
            });
            const geometry = new THREE.BoxGeometry(size, size, size);
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(posX, size / 2, posZ);
            cube.rotation.y = rotationY;
            cube.castShadow = true;
            cube.receiveShadow = true;

            // Рёбра (чёрные линии) – для реалистичности
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x333333 });
            const wireframe = new THREE.LineSegments(edges, lineMat);
            cube.add(wireframe);

            return cube;
        }

        // Размещаем три кубика в ряд с небольшим поворотом для живости
        const cubes = [
            { x: -2.6, z: 0.2, rot: 0.1 },
            { x: 0,    z: 0,   rot: 0 },
            { x: 2.6,  z: -0.2, rot: -0.1 }
        ];

        cubes.forEach(({ x, z, rot }) => {
            const cube = createWhiteCube(x, z, rot);
            scene.add(cube);
        });

        // --- Анимация (статичная, но рендер идёт постоянно для отзывчивости) ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- Адаптация под размер окна ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
