<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3 белых кубика</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            color: #fff;
            font: 14px Arial;
            pointer-events: none;
            user-select: none;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
    <div id="info">🖱️ Вращайте мышью · Колесо – масштаб</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена, камера, рендерер ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 4, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- Управление ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.update();

        // --- Освещение ---
        // Мягкий общий свет
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        // Основной направленный свет (с тенями)
        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Заполняющий свет
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.4);
        fillLight.position.set(-4, 2, -6);
        scene.add(fillLight);

        // Верхний акцент
        const topLight = new THREE.DirectionalLight(0xffffff, 0.3);
        topLight.position.set(0, 8, 0);
        scene.add(topLight);

        // --- Пол (стол) ---
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x4a4a5a,
            roughness: 0.7,
            metalness: 0.1,
            side: THREE.DoubleSide,
        });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);

        // Сетка для красоты
        const grid = new THREE.GridHelper(12, 20, 0xaaaaaa, 0x555555);
        grid.position.y = 0;
        scene.add(grid);

        // --- Создание трёх белых кубиков ---

        function createWhiteCube(posX, posZ) {
            const size = 1.2;
            // Основной материал – белый с лёгкой шероховатостью
            const material = new THREE.MeshStandardMaterial({
                color: 0xf0f0f0,
                roughness: 0.3,
                metalness: 0.05,
                emissive: new THREE.Color(0x222222).multiplyScalar(0.02),
            });
            const geometry = new THREE.BoxGeometry(size, size, size);
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(posX, size / 2, posZ);
            cube.castShadow = true;
            cube.receiveShadow = true;

            // Добавляем рёбра (чёрные линии) – чтобы кубик выглядел "настоящим"
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x333333 });
            const wireframe = new THREE.LineSegments(edges, lineMat);
            cube.add(wireframe); // привязываем линии к кубику

            return cube;
        }

        // Размещаем три кубика в ряд с интервалом 2.5 единицы
        const positions = [
            [-2.5, 0],
            [0, 0],
            [2.5, 0]
        ];

        positions.forEach(([x, z]) => {
            const cube = createWhiteCube(x, z);
            scene.add(cube);
        });

        // --- Анимация (статичная, но с управлением) ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Адаптация под окно ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
